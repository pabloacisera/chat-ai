services:
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./public:/usr/share/nginx/html/public:ro
    depends_on:
      - n8n
      - api-express
    networks:
      - internal

  n8n:
    image: n8nio/n8n:1.68.0
    container_name: n8n-container
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - GENERIC_TIMEZONE=${TIMEZONE:-America/Argentina/Buenos_Aires}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-secret_key_for_testing_with_32chars}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-123456}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - internal

  api-express:
    build: ./packages/api-express
    container_name: api-express
    restart: always
    volumes:
      - ./packages/api-express:/app
      - /app/node_modules
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=development
      - EXPRESS_PORT=3001
    expose:
      - "3001"
    networks:
      - internal
    depends_on:
      - n8n

networks:
  internal:
    driver: bridge

volumes:
  n8n_data: