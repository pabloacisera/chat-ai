events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Deshabilitar cache completamente
    proxy_cache off;
    proxy_cache_bypass $http_cache_control;

    add_header 'Cache-Control' 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
    add_header 'Pragma' 'no-cache';
    add_header 'Expires' '0';

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Deshabilitar cache para todos los archivos
        location / {
            try_files $uri $uri/ /index.html;
            
            # Headers anti-cache
            add_header 'Cache-Control' 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
            add_header 'Pragma' 'no-cache';
            add_header 'Expires' '0';
        }

        # Archivos estáticos (CSS, JS) - sin cache
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|json)$ {
            # Headers anti-cache
            add_header 'Cache-Control' 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
            add_header 'Pragma' 'no-cache';
            add_header 'Expires' '0';
        }

        # Proxy para n8n
        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Sin cache en proxy
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Proxy para API Express
        location /api/ {
            proxy_pass http://api-express:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Sin cache en proxy
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
    }
}