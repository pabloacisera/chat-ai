<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Chat IA</title>
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="public/css/root.css">
</head>

<body>
    <main id="dashboard">
        <aside class="conversations">
            <section class="buttons-section">
                <button type="button" class="new-conversation" id="new-conversation" title="Nueva conversación">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">

                    </svg>
                    Nueva
                </button>
            </section>
            <ul class="list-conversations">
            </ul>
            <section class="user-section">
                <button type="button" class="btn-profile" id="btn-profile" title="Perfil">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                        <path d="M480-80q-66 0-113-47t-47-113q0-66 47-113t113-113q66 0 113 47t47 113q0 66-47 113t-113 113Zm0-213q-41 0-70.5-29.5T380-323q0-41 29.5-70.5T480-423q41 0 70.5 29.5T580-323q0 41-29.5 70.5T480-213Zm0 213Zm-252 96q-33 0-56.5-23.5T148-168v-512h-40v-80h200v-40h280v40h200v80h-40v512q0 33-23.5 56.5T732-168V-80H228Zm400-632v512-512Z"/>
                    </svg>
                    <span class="user-name">Usuario</span>
                </button>
                <button type="button" class="btn-settings" id="btn-settings" title="Configuración">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#F3F3F3">
                        <path d="M686-132 444-376q-20 8-40.5 12t-43.5 4q-100 0-170-70t-70-170q0-36 10-68.5t28-61.5l146 146 72-72-146-146q29-18 61.5-28t68.5-10q100 0 170 70t70 170q0 23-4 43.5T584-516l244 242q12 12 12 29t-12 29l-84 84q-12 12-29 12t-29-12Zm29-85 27-27-256-256q18-20 26-46.5t8-53.5q0-60-38.5-104.5T386-758l74 74q12 12 12 28t-12 28L332-500q-12 12-28 12t-28-12l-74-74q9 57 53.5 95.5T360-440q26 0 52-8t47-25l256 256ZM472-488Z"/>
                    </svg>
                </button>
            </section>
            <div class="resize-handle"></div>
        </aside>
        <section class="messages-content" id="messages-container"></section>
    </main>

    <script src="public/js/reziseAside.js" defer></script>
    <script type="module" src="public/js/index.js"></script>
</body>

</html>
